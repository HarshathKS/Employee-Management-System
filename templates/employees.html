<!DOCTYPE html>
<html>
<head>

<title>Employees</title>

<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employees</title>

```
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<style>
    body{
        background:#f4f6f9;
    }

    .card{
        border:none;
        border-radius:15px;
        box-shadow:0 4px 15px rgba(0,0,0,0.08);
    }

    .table{
        margin-bottom:0;
    }

    .table thead{
        background:#212529;
        color:white;
    }

    .table-hover tbody tr:hover{
        background:#f8f9fa;
    }

    .page-header{
        background:white;
        padding:20px;
        border-radius:15px;
        margin-bottom:20px;
        box-shadow:0 4px 15px rgba(0,0,0,0.08);
    }

    .badge-count{
        font-size:14px;
    }
</style>
```

</head>
<body>

<div class="container mt-4">

```
<div class="page-header d-flex justify-content-between align-items-center">

    <div>
        <h2 class="mb-1">Employee Directory</h2>
        <span class="badge bg-primary badge-count">
            Total Employees: {{ employees|length }}
        </span>
    </div>

    <div>
    <a href="/dashboard" class="btn btn-secondary">
        Dashboard
    </a>

    <a href="/add_employee" class="btn btn-success">
        Add Employee
    </a>

    <a href="/export"
       class="btn btn-info text-white">
       Export CSV
    </a>
     </div>

</div>

<div class="card mb-3">

    <div class="card-body">

        <form method="GET" action="/employees">

            <div class="row">

                <div class="col-md-8">
                    <input type="text"
                           name="search"
                           class="form-control"
                           placeholder="Search by employee name or department">
                </div>

                <div class="col-md-2">
                    <button class="btn btn-primary w-100">
                        Search
                    </button>
                </div>

                <div class="col-md-2">
                    <a href="/employees"
                       class="btn btn-outline-dark w-100">
                        Reset
                    </a>
                </div>

            </div>

        </form>

    </div>

</div>

<div class="card">

    <div class="card-body">

        <div class="table-responsive">

            <table class="table table-hover align-middle">

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Department</th>
                        <th>Salary</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody>

                    {% for emp in employees %}

                    <tr>

                        <td>{{ emp[0] }}</td>

                        <td>
                            <strong>{{ emp[1] }}</strong>
                        </td>

                        <td>{{ emp[2] }}</td>

                        <td>
                            <span class="badge bg-info">
                                {{ emp[4] }}
                            </span>
                        </td>

                        <td>
                            ₹{{ emp[5] }}
                        </td>

                        <td>

                            <a href="/edit_employee/{{ emp[0] }}"
                               class="btn btn-warning btn-sm">
                                Edit
                            </a>

                            <a href="/delete_employee/{{ emp[0] }}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('Delete this employee?')">
                                Delete
                            </a>

                        </td>

                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>
```

</div>

</body>
</html>


</body>
</html>
