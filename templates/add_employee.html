<!DOCTYPE html>
<html>
<head>
    <title>Add Employee</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2>Add Employee</h2>

    <form method="POST">

        <input type="text"
               name="name"
               class="form-control mb-3"
               placeholder="Employee Name"
               required>

        <input type="email"
               name="email"
               class="form-control mb-3"
               placeholder="Email"
               required>

        <input type="text"
               name="phone"
               class="form-control mb-3"
               placeholder="Phone Number"
               required>

        <input type="text"
               name="department"
               class="form-control mb-3"
               placeholder="Department"
               required>

        <input type="number"
               name="salary"
               class="form-control mb-3"
               placeholder="Salary"
               required>

        <input type="date"
               name="joining_date"
               class="form-control mb-3"
               required>

        <button class="btn btn-success">
            Add Employee
        </button>

        <a href="/employees"
           class="btn btn-secondary">
            Back
        </a>

    </form>

</div>

</body>
</html>
