<!DOCTYPE html>
<html>
<head>
<title>Edit Employee</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>
<body>

<div class="container mt-5">

<h2>Edit Employee</h2>

<form method="POST">

<input type="text"
       name="name"
       class="form-control mb-3"
       value="{{ employee[1] }}"
       required>

<input type="email"
       name="email"
       class="form-control mb-3"
       value="{{ employee[2] }}"
       required>

<input type="text"
       name="phone"
       class="form-control mb-3"
       value="{{ employee[3] }}"
       required>

<input type="text"
       name="department"
       class="form-control mb-3"
       value="{{ employee[4] }}"
       required>

<input type="number"
       name="salary"
       class="form-control mb-3"
       value="{{ employee[5] }}"
       required>

<input type="date"
       name="joining_date"
       class="form-control mb-3"
       value="{{ employee[6] }}"
       required>

<button class="btn btn-warning">
    Update Employee
</button>

<a href="/employees"
   class="btn btn-secondary">
   Back
</a>

</form>

</div>

</body>
</html>
